<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f10"/>
      <stop offset="50%" stop-color="#1a1a1e"/>
      <stop offset="100%" stop-color="#0f0f10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d9bf0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1d9bf0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1d9bf0" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1d9bf0" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#dots)"/>
  <rect width="1500" height="500" fill="url(#accent)" transform="skewX(-15)"/>
  <text x="80" y="320" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-4">OffMe</text>
  <text x="84" y="380" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="500" fill="#1d9bf0" letter-spacing="2">DESCONECTE DO RUÍDO</text>
  <g transform="translate(1300, 100)">
    <circle cx="0" cy="0" r="48" fill="#1d9bf0"/>
    <path d="M-20,-2 L-6,12 L20,-14" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
