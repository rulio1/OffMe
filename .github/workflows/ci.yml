name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: frontend-web

jobs:
  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          JWT_SECRET: ci_build_secret_minimum_32_chars_long
          NEXT_PUBLIC_DEV_AUTH: 'true'

  e2e:
    runs-on: ubuntu-latest
    needs: frontend-web
    if: ${{ secrets.DATABASE_URL != '' }}
    defaults:
      run:
        working-directory: frontend-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run migrations
        run: node scripts/migrate.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: 'true'

      - name: Build and start server
        run: |
          npm run build
          npm run start &
          started=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/v1/health; then
              started=1
              break
            fi
            sleep 2
          done
          if [ "$started" -ne 1 ]; then
            echo "Server failed to start within 120s"
            exit 1
          fi
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_e2e_secret_minimum_32_chars_long' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: 'true'
          NEXT_PUBLIC_DEV_AUTH: 'false'
          CRON_SECRET: ci_e2e_cron_secret_for_tests_only

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:3000/api/v1
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-web/playwright-report/
          retention-days: 7