# OffMe — Docker Compose
# Uso:
#   make minimal   → PostgreSQL + Redis + MinIO (auth / frontend / uploads)
#   make infra     → toda infraestrutura de dados
#   make up        → infra + microserviços + frontend

x-service-env: &service-env
  POSTGRES_URL: jdbc:postgresql://postgres:5432/offme?user=offme&password=offme_dev
  CASSANDRA_HOSTS: cassandra
  CASSANDRA_KEYSPACE: offme
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP: kafka:29092
  ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans

services:
  # ── Essencial (frontend + auth) ────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: offme-postgres
    profiles: [minimal, infra, app]
    restart: unless-stopped
    environment:
      POSTGRES_DB: offme
      POSTGRES_USER: offme
      POSTGRES_PASSWORD: offme_dev
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schemas/postgres/offme_init.sql:/docker-entrypoint-initdb.d/001_offme_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offme -d offme"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: offme-redis
    profiles: [minimal, infra, app]
    restart: unless-stopped
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: offme-minio
    profiles: [minimal, infra, app]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: offme
      MINIO_ROOT_PASSWORD: offme_dev
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: offme-minio-init
    profiles: [minimal, infra, app]
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 offme offme_dev &&
      mc mb local/offme-media --ignore-existing &&
      mc anonymous set download local/offme-media &&
      echo 'Bucket offme-media pronto'
      "
    restart: "no"

  # ── Data Stores (stack completa) ─────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: offme-cassandra
    profiles: [infra, app]
    restart: unless-stopped
    ports: ["9042:9042"]
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:4.1
    container_name: offme-cassandra-init
    profiles: [infra, app]
    depends_on:
      cassandra: { condition: service_healthy }
    volumes:
      - ../schemas/cassandra/001_init.cql:/init.cql:ro
    entrypoint: ["cqlsh", "cassandra", "-f", "/init.cql"]
    restart: "no"

  neo4j:
    image: neo4j:5-community
    container_name: offme-neo4j
    profiles: [infra, app]
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/offme_dev
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: offme-elasticsearch
    profiles: [infra, app]
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Streaming ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: offme-zookeeper
    profiles: [infra, app]
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: offme-kafka
    profiles: [infra, app]
    restart: unless-stopped
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Observability ────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: offme-zipkin
    profiles: [infra, app]
    restart: unless-stopped
    ports: ["9411:9411"]

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: offme-prometheus
    profiles: [infra, app]
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    container_name: offme-grafana
    profiles: [infra, app]
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: offme
    volumes:
      - grafana_data:/var/lib/grafana

  # ── Application Services ─────────────────────────────────
  api-gateway:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.gateway
    container_name: offme-api-gateway
    profiles: [app]
    ports: ["8080:8080"]
    environment:
      <<: *service-env
      HTTP_PORT: 8080
      SERVICE_NAME: api-gateway
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  post-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.post
    container_name: offme-post-service
    profiles: [app]
    ports: ["8081:8081", "9081:9081"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8081
      HTTP_PORT: 9081
      SERVICE_NAME: post-service
    depends_on:
      cassandra-init: { condition: service_completed_successfully }
      kafka: { condition: service_healthy }

  timeline-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.timeline
    container_name: offme-timeline-service
    profiles: [app]
    ports: ["8082:8082", "9082:9082"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8082
      HTTP_PORT: 9082
      SERVICE_NAME: timeline-service
      CELEBRITY_THRESHOLD: 10000
    depends_on:
      cassandra-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  graph-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.graph
    container_name: offme-graph-service
    profiles: [app]
    ports: ["8083:8083"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8083
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_AUTH: neo4j/offme_dev
    depends_on:
      neo4j: { condition: service_healthy }
      postgres: { condition: service_healthy }

  identity-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.identity
    container_name: offme-identity-service
    profiles: [app]
    ports: ["8084:8084"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8084
      JWT_SECRET: offme_dev_secret_change_in_prod
    depends_on:
      postgres: { condition: service_healthy }

  recs-serving:
    build:
      context: ../backend-rust/recs-serving
      dockerfile: ../../infra/docker/Dockerfile.recs
    container_name: offme-recs-serving
    profiles: [app]
    ports: ["8090:8090"]
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  frontend-web:
    build:
      context: ../frontend-web
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: offme-frontend
    profiles: [app]
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://offme:offme_dev@postgres:5432/offme
      JWT_SECRET: offme_dev_secret_change_in_production
      API_GATEWAY_URL: http://api-gateway:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    depends_on:
      postgres: { condition: service_healthy }
      api-gateway: { condition: service_started }

volumes:
  postgres_data:
  minio_data:
  cassandra_data:
  neo4j_data:
  es_data:
  grafana_data: