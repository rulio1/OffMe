version: "3.9"

x-service-env: &service-env
  POSTGRES_URL: jdbc:postgresql://postgres:5432/pulse
  CASSANDRA_HOSTS: cassandra
  CASSANDRA_KEYSPACE: pulse
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP: kafka:9092
  ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans

services:
  # ── Data Stores ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: offme
      POSTGRES_USER: offme
      POSTGRES_PASSWORD: offme_dev
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schemas/postgres/offme_init.sql:/docker-entrypoint-initdb.d/001_offme_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offme"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    ports: ["9042:9042"]
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 30s
      timeout: 10s
      retries: 10

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra: { condition: service_healthy }
    volumes:
      - ../schemas/cassandra/001_init.cql:/init.cql
    entrypoint: ["cqlsh", "cassandra", "-f", "/init.cql"]
    restart: "no"

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/pulse_dev
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neo4j_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ── Streaming ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Observability ────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.4
    ports: ["9411:9411"]

  prometheus:
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: pulse
    volumes:
      - grafana_data:/var/lib/grafana

  # ── Application Services ─────────────────────────────────
  api-gateway:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.gateway
    ports: ["8080:8080"]
    environment:
      <<: *service-env
      HTTP_PORT: 8080
      SERVICE_NAME: api-gateway
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  post-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.post
    ports: ["8081:8081", "9081:9081"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8081
      HTTP_PORT: 9081
      SERVICE_NAME: post-service
    depends_on:
      cassandra-init: { condition: service_completed_successfully }
      kafka: { condition: service_started }

  timeline-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.timeline
    ports: ["8082:8082", "9082:9082"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8082
      HTTP_PORT: 9082
      SERVICE_NAME: timeline-service
      CELEBRITY_THRESHOLD: 10000
    depends_on:
      cassandra-init: { condition: service_completed_successfully }
      redis: { condition: service_started }
      kafka: { condition: service_started }

  graph-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.graph
    ports: ["8083:8083"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8083
      NEO4J_URL: bolt://neo4j:7687
    depends_on: [neo4j, postgres]

  identity-service:
    build:
      context: ../backend-scala
      dockerfile: ../infra/docker/Dockerfile.identity
    ports: ["8084:8084"]
    environment:
      <<: *service-env
      THRIFT_PORT: 8084
      JWT_SECRET: pulse_dev_secret_change_in_prod
    depends_on:
      postgres: { condition: service_healthy }

  recs-serving:
    build:
      context: ../backend-rust/recs-serving
      dockerfile: ../../infra/docker/Dockerfile.recs
    ports: ["8090:8090"]
    environment:
      REDIS_URL: redis://redis:6379
    depends_on: [redis]

  frontend-web:
    build:
      context: ../frontend-web
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports: ["3000:3000"]
    environment:
      API_GATEWAY_URL: http://api-gateway:8080
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    depends_on: [api-gateway]

volumes:
  postgres_data:
  cassandra_data:
  neo4j_data:
  es_data:
  grafana_data: