app = 'offme-backend'
primary_region = 'gru'

[build]
  dockerfile = "Dockerfile"

[env]
  DB_HOST = 'db.mojmkhuafptpvwrprxqg.supabase.co'
  DB_NAME = 'postgres'
  DB_PASSWORD = 'jaqgaz-dutroh-5wInbo'
  DB_PORT = '5432'
  DB_USER = 'postgres'
  JWT_SECRET = 'offme_dev_secret_change_in_production_please_replace'
  REDIS_HOST = 'localhost'
  REDIS_PORT = '6379'
  IDENTITY_SERVICE_URL = 'http://identity-service:8081'
  POST_SERVICE_URL = 'http://post-service:8082'
  TIMELINE_SERVICE_URL = 'http://timeline-service:8083'
  GRAPH_SERVICE_URL = 'http://graph-service:8084'
  NOTIFICATION_SERVICE_URL = 'http://notification-service:8085'
  WEBSOCKET_SERVICE_URL = 'http://websocket-service:8086'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
